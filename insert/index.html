<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>PUMABOT</title>
  <script async src="https://tally.so/widgets/embed.js"></script>
  <style type="text/css">
    html {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      border: 0;
    }

    #body {
      display: none;
    }
  </style>
</head>

<body id="body">
  <iframe id="iframe" width="100%" height="100%" frameborder="0" marginheight="0" marginwidth="0"></iframe>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const query = new URLSearchParams(window.location.search)
    const header = query.get("header")
    const id = query.get("id")
    const body = document.getElementById("body")
    const iframe = document.getElementById("iframe")
    //
    const main = async () => {
      //await liff.init({ liffId: "2008812156-cgGRzGOW" })
      if (window.innerWidth > 481) {
        console.log(liff.isInClient())
        body.style.display = "block"
        iframe.dataset.tallySrc = "https://tally.so/r/" + id + "?header=" + header + "&id=" + id
      }
    }
    //
    main()
  </script>
</body>

</html>
