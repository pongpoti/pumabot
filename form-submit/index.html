<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PUMABOT</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body id="body" class="min-h-screen">
  <div id="container" class="flex justify-center align-center h-screen">
  </div>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    const main = async () => {
      if (true) {
        await liff.init({ liffId: "2008812156-MigabOZT" })
        if (true) {
          const query = new URLSearchParams(window.location.search)
          console.log(query)
          const id = query.get("id")
          const color = query.get("color")
          const body = document.getElementById("body")
          body.classList.add("bg-" + color)
          const container = document.getElementById("container")
          const load = document.createElement("div")
          load.classList.add("loading", "loading-dots", "loading-xl")
          container.appendChild(load)
          setTimeout(async () => {
            try {
              const response = await axios.delete("https://api.tally.so/forms/" + id, {
                headers: {
                  "Authorization": "Bearer tly-ASqvEMi4UuCizMUvSXDMTaH8L2Fqe7Ax",
                  "Content-Type": "application/json"
                }
              })
              if (response.status === 204) {
                liff.closeWindow()
              }
            } catch (error) {
              console.error(error)
            }
          }, 2000);
        }
      }
    }
    main()
  </script>
</body>

</html>
