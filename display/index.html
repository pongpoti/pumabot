        }
        const header_object = {
            M1: ["MATERIAL", "hard finishes", "bg-purple-200"],
            M2: ["MATERIAL", "soft finishes", "bg-purple-200"],
            M3: ["MATERIAL", "hardware", "bg-purple-200"],
            M4: ["MATERIAL", "sanitary", "bg-purple-200"],
            F1: ["FURNITURE", "indoor", "bg-rose-200"],
            F2: ["FURNITURE", "outdoor", "bg-rose-200"],
            F3: ["FURNITURE", "customized furniture", "bg-rose-200"],
            L1: ["LIGHTING", "general", "bg-amber-200"],
            L2: ["LIGHTING", "decorative lamp", "bg-amber-200"],
            A1: ["ACCESSORIES", "artwork", "bg-green-200"],
            A2: ["ACCESSORIES", "props", "bg-green-200"],
            A3: ["ACCESSORIES", "carpet", "bg-green-200"],
            A4: ["ACCESSORIES", "amenity", "bg-green-200"]
        }
        //
        const main = async () => {
            await liff.init({ liffId: "2008812156-UdgwP1vW" })
            if (window.innerWidth < 481 && liff.isInClient()) {
                const profile = await liff.getProfile()
                image_profile.src = profile.pictureUrl
                text_profile.innerHTML = "Hi! <b>" + profile.displayName + "</b>"
                body.style.display = "block"
                navbar.classList.add(header_object[header][2])
                image_icon.src = category_object[header.slice(0, 1)]
                title.innerText = header_object[header][0]
                subtitle.innerText = header_object[header][1]
                //
                const loading = document.createElement("div")
                loading.className = "loading loading-bars loading-xl"
                content.appendChild(loading)
                //
                const array = await getDataByHeader(header)
                content.removeChild(loading)
                //
                for (const a of array) {
                    content.appendChild(createDisplayList(a[0]))
                }
                //
                const checkboxes = document.getElementsByClassName("checkbox")
                const collapses = document.getElementsByClassName("collapse")
                const texts = document.getElementsByClassName("text")
                //
                for (let i = 0; i < checkboxes.length; i++) {
                    checkboxes[i].addEventListener("change", function () {
                        if (this.checked) {
                            texts[i].classList.add("font-bold")
                            console.log(array[i][1])
                            setTimeout(() => {
                                window.location.assign(array[i][1])
                                texts[i].classList.remove("font-bold")
                                this.checked = false
                            }, 1000);
                        }
                    })
                }
            }
        }
        const getDataByHeader = async (header) => {
            try {
                const { data, error } = await _supabase.from("src").select().eq("header", header)
                let array = []
                for (const d of data) {
                    array.push([d.workplace, d.link])
                }
                array.sort((a, b) => {
                    if (a[0] < b[0]) {
                        return -1
                    }
                    if (a[0] > b[0]) {
                        return 1
                    }
                    return 0
                });
                return array
            } catch (error) {
                console.error(error)
            }
        }
        const createDisplayList = (text) => {
            const div = document.createElement("div")
            div.className = "bg-base-100 collapse shadow-md"
            const input = document.createElement("input")
            input.type = "checkbox"
            input.className = "checkbox peer"
            const title = document.createElement("div")
            title.className = "collapse-title peer-checked:" + header_object[header][2]
            const content = document.createElement("div")
            content.className = "text pl-6 text-center text-sky-900 text-lg tracking-widest"
            const firstLetter = "<b>" + text.charAt(0).toUpperCase() + "</b>"
            const remainingLetters = text.slice(1)
            content.innerHTML = firstLetter + remainingLetters
            title.appendChild(content)
            div.appendChild(input)
            div.appendChild(title)
            div.classList.add("animate__animated", "animate__pulse")
            return div
        }
        //
        main()
    </script>
