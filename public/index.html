    <script>
        //const queryString = decodeURIComponent(window.location.search).replace("?liff.state=", "")
        const queryString = decodeURIComponent(window.location.search)
        const query_header = new URLSearchParams(queryString).get("header")
        const query_color = new URLSearchParams(queryString).get("color")
        //
        const container = document.getElementById("container")
        const header = document.getElementById("header")
        const subheader = document.getElementById("subheader")
        //
        const header_object = {
            M1: ["MATERIAL", "hard finishes"],
            M2: ["MATERIAL", "sanitary"],
            M3: ["MATERIAL","hardware"],
            M4: ["MATERIAL", "soft finishes"],
            F1: ["FURNITURE", "indoor"],
            F2: ["FURNITURE", "outdoor"],
            F3: ["FURNITURE", "customized furniture"],
            L1: ["LIGHTING", "general"],
            L2: ["LIGHTING", "decorative lamp"],
            A1: ["ACCESSORIES", "artwork"],
            A2: ["ACCESSORIES", "decorating object"],
            A3: ["ACCESSORIES", "carpet"],
            A4: ["ACCESSORIES", "amenity"]
        }
        const color_object = {
            purple: "bg-purple-200",
            pink: "bg-pink-200",
            amber: "bg-amber-200",
            green: "bg-green-200"
        }
        //
        header.innerText = header_object[query_header][0]
        subheader.innerText = header_object[query_header][1]
        container.classList.add(color_object[query_color])

    </script>
